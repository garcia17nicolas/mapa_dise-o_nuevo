<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Municipio - Nasa Kiwe</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 18px;
      opacity: 0.9;
    }

    .content {
      padding: 40px 30px;
    }

    .info-card {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .info-card h3 {
      color: #495057;
      margin-bottom: 15px;
      font-size: 20px;
    }

    .info-card p {
      color: #6c757d;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .back-button {
      display: inline-block;
      padding: 12px 24px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.3s;
      margin-top: 20px;
    }

    .back-button:hover {
      background: #5568d3;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    select, button {
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #d6dbe3;
      font-size: 14px;
    }

    button {
      background: #667eea;
      color: white;
      cursor: pointer;
      border: none;
      font-weight: 600;
    }

    .entry {
      border: 1px solid #e6e9ef;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fff;
    }

    .entry h4 {
      color: #2f3f64;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .entry p {
      color: #53617d;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .docs a {
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 8px;
      color: #2d62c5;
      text-decoration: none;
      font-weight: 600;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .photo-grid img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #dfe5ef;
    }

    .empty {
      color: #8a93a8;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1 id="title">Cargando municipio...</h1>
      <p>Departamento del Cauca</p>
    </div>

    <div class="content">
      <div class="info-card">
        <h3>📅 Filtrar por año</h3>
        <div class="filter-row">
          <select id="filterYear"></select>
          <button id="clearFilter" type="button">Ver todo</button>
        </div>
      </div>

      <div class="info-card">
        <h3>📊 Información publicada</h3>
        <div id="entries">
          <p class="empty">Cargando información del municipio...</p>
        </div>
      </div>

      <a href="index.html" class="back-button">⬅️ Volver al mapa</a>
    </div>
  </div>

  <script src="municipio.js"></script>

</body>
</html>
