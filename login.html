<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Nasa Kiwe Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f9f5f0 0%, #f5e6d3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      animation: slideDown 0.5s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-section img {
      height: 100px;
      width: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.1));
    }

    .logo-section h1 {
      font-size: 28px;
      color: #D97373;
      margin-bottom: 8px;
    }

    .logo-section p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #D97373;
      box-shadow: 0 0 0 3px rgba(217, 115, 115, 0.1);
    }

    .form-group.error input {
      border-color: #e74c3c;
    }

    .error-message {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .form-group.error .error-message {
      display: block;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #D97373 0%, #B85555 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(217, 115, 115, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      animation: slideIn 0.3s ease-out;
      display: none;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert.show {
      display: block;
    }

    .alert.success {
      background: #d4edda;
      border-left: 4px solid #28a745;
      color: #155724;
    }

    .alert.error {
      background: #f8d7da;
      border-left: 4px solid #dc3545;
      color: #721c24;
    }

    .info-box {
      background: #f0f8ff;
      border-left: 4px solid #5DADE2;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #1a5f7a;
      margin-top: 20px;
      display: none;
    }

    .info-box.show {
      display: block;
    }

    .loader {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    button.loading {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .demo-credentials {
      background: #fffacd;
      border: 1px dashed #f4d35e;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #333;
      margin-top: 20px;
      line-height: 1.6;
    }

    .demo-credentials strong {
      color: #D97373;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <!-- Logo y Título -->
    <div class="logo-section">
      <img src="logo.png" alt="NASA KIWE Logo">
      <h1>NASA KIWE</h1>
      <p>Panel Administrativo Seguro</p>
    </div>

    <!-- Notificaciones -->
    <div id="alertBox" class="alert"></div>

    <!-- Formulario -->
    <form id="loginForm">
      <div class="form-group">
        <label for="username">👤 Usuario</label>
        <input 
          type="text" 
          id="username" 
          name="username"
          placeholder="Ingresa tu usuario"
          required
          autocomplete="username"
        >
        <div class="error-message">Por favor ingresa un usuario válido</div>
      </div>

      <div class="form-group">
        <label for="password">🔐 Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          placeholder="Ingresa tu contraseña"
          required
          autocomplete="current-password"
        >
        <div class="error-message">Por favor ingresa tu contraseña</div>
      </div>

      <button type="submit" id="loginBtn">
        <span id="btnText">Iniciar Sesión</span>
      </button>
    </form>

    

    <!-- Información de rol -->
    <div id="roleInfo" class="info-box">
      Tu rol: <strong id="roleDisplay"></strong>
      <br>Permisos: <strong id="permissionsDisplay"></strong>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const alertBox = document.getElementById('alertBox');
    const roleInfo = document.getElementById('roleInfo');

    // Mostrar notificación
    function showAlert(message, type = 'error') {
      alertBox.textContent = message;
      alertBox.className = `alert show ${type}`;
      setTimeout(() => alertBox.classList.remove('show'), 4000);
    }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showAlert('Por favor completa todos los campos', 'error');
        return;
      }

      // Mostrar cargando
      loginBtn.disabled = true;
      btnText.textContent = '⏳ Iniciando sesión...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showAlert(data.error || 'Error en autenticación', 'error');
          loginBtn.disabled = false;
          btnText.textContent = 'Iniciar Sesión';
          return;
        }

        // Guardar token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        showAlert(`¡Bienvenido, ${data.user.username}! 🎉`, 'success');

        // Redirigir después de 1 segundo
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1000);

      } catch (err) {
        console.error('Error:', err);
        showAlert('Error de conexión. Intenta de nuevo.', 'error');
        loginBtn.disabled = false;
        btnText.textContent = 'Iniciar Sesión';
      }
    });

    // Focus en enter
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginForm.dispatchEvent(new Event('submit'));
    });
  </script>

</body>
</html>
